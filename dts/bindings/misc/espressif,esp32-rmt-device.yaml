# Common fields for Espressif RMT devices

include: [base.yaml, pinctrl-device.yaml, power.yaml]

on-bus: "espressif,esp32-rmt"

properties:
  reg:
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  with-dma:
    type: boolean
    description: |
      If set, the driver will allocate an RMT channel with DMA capability.
      DMA feature is available only on ESP32S3 and with only one "tx" and
      one "rx" DMA channels are available.
